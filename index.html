<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>For My Love ❤️</title>

<style>

body{

margin:0;

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

font-family:Arial,sans-serif;

background:linear-gradient(135deg,#ffb6d9,#ffd6e7);

text-align:center;

}

h1{

color:white;

font-size:40px;

text-shadow:2px 2px 10px pink;

}

p{

color:white;

font-size:18px;

}

#yesBtn{

font-size:28px;

padding:15px 40px;

border:none;

border-radius:40px;

cursor:pointer;

}

#noBtn{

position:absolute;

font-size:14px;

padding:8px 15px;

border:none;

border-radius:20px;

cursor:pointer;

}

.float{

position:absolute;

font-size:30px;

animation:up linear infinite;

}

@keyframes up{

from{transform:translateY(100vh);}

to{transform:translateY(-120vh);}

}

#result{

display:none;

}

img{

width:280px;

border-radius:20px;

}

</style>

</head>

<body>

<div class="float" style="left:10%;animation-duration:12s;">🎈</div>

<div class="float" style="left:25%;animation-duration:10s;">💖</div>

<div class="float" style="left:50%;animation-duration:15s;">💕</div>

<div class="float" style="left:75%;animation-duration:11s;">🎈</div>

<div class="float" style="left:90%;animation-duration:13s;">❤️</div>

<div id="proposal">

<h1>❤️ Will You Be My Forever? ❤️</h1>

<p>You make my world beautiful 💖</p>

<button id="yesBtn">YES 💍❤️</button>

<button id="noBtn">No</button>

</div>

<div id="result">

<img src="https://media.tenor.com/Jh6D6Nw8xJQAAAAC/cute-cat-love.gif">

<h2>🥰 Good Decision ❤️</h2>

<p>Now you are officially stuck with me forever 💖</p>

</div>

<script>

const noBtn=document.getElementById("noBtn");

const yesBtn=document.getElementById("yesBtn");

function moveNo(){

let x=Math.random()*(window.innerWidth-100);

let y=Math.random()*(window.innerHeight-60);

noBtn.style.left=x+"px";

noBtn.style.top=y+"px";

}

noBtn.addEventListener("click",moveNo);

noBtn.addEventListener("touchstart",moveNo);

yesBtn.addEventListener("click",function(){

document.getElementById("proposal").style.display="none";

document.getElementById("result").style.display="block";

});

moveNo();

</script>

</body>

</html>
